<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAMZ | EASY DRAG FREE</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --accent: #bc13fe;
            --glass: rgba(10, 20, 40, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --danger: #ff5f57;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background: #02040a;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- BACKGROUND PARTIKEL --- */
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* --- JAM DI TENGAH ATAS --- */
        .clock-widget {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 20;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 40px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
        }
        #time { font-size: 32px; font-weight: 700; letter-spacing: 2px; }
        #date { font-size: 11px; color: var(--primary); letter-spacing: 3px; }

        /* --- JENDELA PC UTAMA --- */
        .pc-window {
            position: relative;
            z-index: 10;
            width: 520px;
            margin-top: 60px;
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 50px 150px rgba(0, 0, 0, 0.9);
            animation: bootAnim 1s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
        }

        @keyframes bootAnim { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .window-header {
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: var(--danger); } .yellow { background: #febc2e; } .green { background: #28c840; }

        .window-body { padding: 40px; text-align: center; }
        .brand { font-size: 45px; font-weight: 700; letter-spacing: -2px; background: linear-gradient(45deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }
        
        input {
            width: 100%; padding: 18px; background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border); border-radius: 12px;
            color: white; font-family: 'Fira Code'; outline: none;
            transition: 0.3s; text-align: center; margin-bottom: 15px;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }

        .btn-exe {
            width: 100%; padding: 18px; background: var(--primary);
            color: #000; border: none; border-radius: 12px;
            font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.4s;
            margin-bottom: 15px;
        }
        .btn-exe:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4); }

        /* --- TEKS BELI KEY --- */
        .buy-notice {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 30px;
        }
        .buy-notice a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        /* --- MONITOR CPU/GPU INTEGRATED --- */
        .system-monitor-integrated {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
        }

        .stat-item { margin-bottom: 5px; }
        .stat-label { font-family: 'Fira Code'; font-size: 9px; color: var(--primary); display: flex; justify-content: space-between; margin-bottom: 6px; text-transform: uppercase; }
        .stat-bar-bg { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
        .stat-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 1.5s ease-in-out; }

        /* --- DASHBOARD VIEW --- */
        #dashboard { display: none; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; text-align: left; }
        .data-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 13px; }
        .data-label { font-size: 9px; color: var(--primary); text-transform: uppercase; margin-bottom: 4px; }

        .dl-final { display: block; width: 100%; padding: 18px; background: transparent; border: 1px solid var(--primary); color: var(--primary); text-align: center; border-radius: 12px; text-decoration: none; font-weight: 700; transition: 0.3s; margin-bottom: 25px; }
        .dl-final:hover { background: var(--primary); color: #000; }

        /* --- TASKBAR --- */
        .taskbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; display: flex; gap: 15px; z-index: 100; }
        .task-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: 0.3s; font-size: 18px; }
        .task-icon:hover { transform: translateY(-8px); background: var(--primary); color: black; }

    </style>
</head>

            <div id="dashboard">
                <div class="brand" style="font-size: 32px; margin-bottom: 15px;">WELCOME BUYER</div>
                <div class="data-grid">
                    <div class="data-item"><div class="data-label">File</div>EASY_DRAG_HS.zip</div>
                    <div class="data-item"><div class="data-label">Status</div>READY</div>
                    <div class="data-item"><div class="data-label">Version</div>2026_STABLE</div>
                    <div class="data-item"><div class="data-label">Security</div>ENCRYPTED</div>

    <script>
        // KONFIGURASI PARTIKEL (DIPERBANYAK)
        particlesJS("particles-js", {

        // JAM LOGIC
        function updateClock() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('id-ID', {hour12: false});
            document.getElementById('date').innerText = now.toLocaleDateString('id-ID', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' }).toUpperCase();
        }
        setInterval(updateClock, 1000); updateClock();

        // SIMULASI CPU/GPU
        function updateStats() {
            const cpu = Math.floor(Math.random() * 40 + 10);
            const gpu = Math.floor(Math.random() * 30 + 40);
            const ram = (Math.random() * 2 + 2).toFixed(1);
            const net = Math.floor(Math.random() * 40 + 10);

            document.getElementById('cpu-bar').style.width = cpu + '%';
            document.getElementById('cpu-val').innerText = cpu + '%';
            document.getElementById('gpu-bar').style.width = gpu + '%';
            document.getElementById('gpu-val').innerText = gpu + '°C';
            document.getElementById('ram-bar').style.width = (ram*15) + '%';
            document.getElementById('ram-val').innerText = ram + 'GB';
            document.getElementById('net-bar').style.width = net + '%';
            document.getElementById('net-val').innerText = net + 'ms';
        }
        setInterval(updateStats, 2000); updateStats();

        // LOGIN LOGIC

            const valid = ["2026"];
            if (valid.includes(val.toUpperCase())) {
                document.getElementById('auth-section').style.display = 'none';

        }
