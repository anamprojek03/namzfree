<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAMZ EASY DRAG | OS QUANTUM TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #0051ff;
            --dark-deep: #02040a;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--dark-deep);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Particles HD Background */
        #particles-js {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background: radial-gradient(circle at center, #0a1128 0%, #02040a 100%);
        }

        /* Jendela Komputer (Glassmorphism) */
        .pc-window {
            position: relative;
            z-index: 10;
            width: 500px;
            background: rgba(10, 20, 40, 0.4);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8), 
                        inset 0 0 20px rgba(0, 212, 255, 0.05);
            animation: bootUp 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes bootUp {
            from { opacity: 0; transform: scale(0.8) translateY(50px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* Window Header */
        .window-header {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 12px 12px 0 0;
        }

        .dots { display: flex; gap: 8px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .red { background: #ff5f57; }
        .yellow { background: #febc2e; }
        .green { background: #28c840; }

        .header-title {
            font-size: 11px;
            font-family: 'Fira Code', monospace;
            letter-spacing: 2px;
            color: var(--primary);
            text-transform: uppercase;
        }

        /* Content Area */
        .window-body {
            padding: 40px;
            text-align: center;
        }

        .brand {
            font-weight: 700;
            font-size: 42px;
            letter-spacing: -2px;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .system-status {
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 40px;
        }

        /* Input Cyber */
        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-family: 'Fira Code';
            outline: none;
            transition: 0.3s;
            text-align: center;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        /* Button OS */
        .btn-exe {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn-exe:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.4);
        }

        /* Dashboard View */
        #dashboard { display: none; text-align: left; }

        .info-row {
            padding: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }

        .label { color: var(--primary); margin-right: 10px; }

        .dl-trigger {
            margin-top: 25px;
            display: block;
            text-align: center;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 15px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }

        .dl-trigger:hover { background: var(--primary); color: black; }

    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="pc-window" id="main-win">
        <div class="window-header">
            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="header-title">Easy Drag_v4.0.system</div>
            <div></div>
        </div>

        <div class="window-body">
            
            <div id="auth-section">
                <div class="brand">NAMZ OS</div>
                <div class="system-status">Uptime: 99.9% | RAM: 32GB | Security: Max</div>
                
                <div class="input-box">
                    <input type="text" id="passkey" placeholder="Enter Authentication Key" autocomplete="off">
                </div>

                <button class="btn-exe" onclick="authenticate()">Initialize Access</button>
            </div>

            <div id="dashboard">
                <h2 style="margin-bottom: 20px; font-size: 18px;">Package Info:</h2>
                <div class="info-row"><span class="label">></span> NAME: EASY_DRAG_HS_FREE.zip</div>
                <div class="info-row"><span class="label">></span> BUILD: 2026.03.05_v1</div>
                <div class="info-row"><span class="label">></span> SOURCE: Global_Mediafire_CDN</div>
                <div class="info-row"><span class="label">></span> STATUS: Ready to Fetch</div>

                <a href="https://www.mediafire.com/file/btnsdtzb0mccqyp/EASY_DRAG_HS_FREE.zip/file" class="dl-trigger">
                    EXECUTE DOWNLOAD
                </a>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 100, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00d4ff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#00d4ff", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 1, "direction": "none", "random": true, "out_mode": "out" }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { 
                    "onhover": { "enable": true, "mode": "grab" },
                    "onclick": { "enable": true, "mode": "push" },
                    "resize": true 
                },
                "modes": { 
                    "grab": { "distance": 140, "line_linked": { "opacity": 1 } }
                }
            },
            "retina_detect": true
        });

        function authenticate() {
            const key = document.getElementById('passkey').value;
            const valid = ["2026", "TRIAL", "ADMIN"];

            if (valid.includes(key)) {
                const win = document.getElementById('main-win');
                win.style.transform = "scale(0.98)";
                
                setTimeout(() => {
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    win.style.transform = "scale(1)";
                }, 400);
            } else {
                alert("ACCESS DENIED: Kernel Mismatch!");
            }
        }
    </script>
</body>
</html>
